# Services locaux pour le developpement de Residence Catalog.
# PostgreSQL 15 + Redis 7. Les donnees persistent dans des volumes nommes.
#
# Usage :
#   docker compose up -d         # demarrer
#   docker compose logs -f db    # suivre les logs Postgres
#   docker compose down          # arreter (donnees conservees)
#   docker compose down -v       # arreter ET supprimer les volumes

services:
  db:
    image: postgres:15-alpine
    container_name: residence-catalog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: residence_catalog
    ports:
      - "5432:5432"
    volumes:
      - residence-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d residence_catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: residence-catalog-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - residence-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  residence-db-data:
    name: residence-catalog-db-data
  residence-redis-data:
    name: residence-catalog-redis-data
